<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>와사비 일본어 회화 연습</title>
    <style>
        /* 선생님이 기존에 사용하시던 디자인(CSS) 코드가 있다면 이곳에 그대로 붙여넣으세요 */
        body { font-family: sans-serif; padding: 20px; background-color: #1e1e1e; color: #fff; }
        .input-group { margin-bottom: 15px; }
        button { padding: 10px 20px; margin: 5px 0; width: 100%; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
        #btn1 { background-color: #5c1e1e; color: white; }
        #btn2 { background-color: #1e2a5c; color: white; }
        #chat-box { margin-top: 20px; padding: 10px; background-color: #2c2c2c; border-radius: 8px; min-height: 200px; }
        input { padding: 10px; border-radius: 5px; border: none; width: calc(100% - 20px); margin-top: 5px; background-color: #333; color: white; }
    </style>
</head>
<body>
    <h2>학생 정보</h2>
    <div class="input-group">
        <label>학번</label>
        <input type="text" id="studentId" placeholder="예: 1111">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="studentName" placeholder="예: 홍길동">
    </div>

    <button id="btn1">🏮 연중행사 연습 시작</button>
    <button id="btn2">💬 프리토킹(자유 대화) 시작</button>

    <div id="chat-box"></div>

    <script type="module">
        // 1. Firebase SDK 불러오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

        // 2. Firebase 설정 (선생님의 콘솔 설정값 그대로 유지)
        const firebaseConfig = {
apiKey: "AIzaSyDy_r53zk_b30jmvgqXZEovIAUBZ-iohpc",
  authDomain: "wasabi-59c92.firebaseapp.com",
  projectId: "wasabi-59c92",
  storageBucket: "wasabi-59c92.firebasestorage.app",
  messagingSenderId: "510074167540",
  appId: "1:510074167540:web:60efffba0fc23653a3fea1",
  measurementId: "G-TB43G5DPL5"
};
        // 3. Firebase 및 Functions 초기화
        const app = initializeApp(firebaseConfig);
        const functions = getFunctions(app);
        const chatWithWasabi = httpsCallable(functions, 'chatWithWasabi');

        // 4. 채팅 화면 업데이트 함수
        function updateChatUI(sender, text) {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<p><strong>${sender}:</strong> ${text}</p>`;
        }

        // 5. 서버(Functions)로 메시지를 안전하게 전송하는 함수
        async function startChat(userInput) {
            const studentId = document.getElementById("studentId").value;
            const studentName = document.getElementById("studentName").value;

            if(!studentId || !studentName) {
                alert("학번과 이름을 먼저 입력해 주세요.");
                return;
            }

            // 학생이 누른 버튼에 대한 메시지를 화면에 먼저 띄움
            updateChatUI(studentName, userInput);
            
            // 로딩 중 표시 (선택 사항)
            updateChatUI("시스템", "와사비가 답변을 생각하는 중입니다...");

            try {
                // 서버로 데이터 전송 (직접적인 API 호출 없음)
                const result = await chatWithWasabi({ message: userInput });
                
                // 로딩 메시지 지우고 실제 답변 띄우기 (간단한 구현을 위해 덮어쓰기 대신 추가)
                updateChatUI("와사비 선생님", result.data.reply); 
            } catch (error) {
                console.error("통신 오류:", error);
                updateChatUI("시스템", "서버와 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.");
            }
        }

        // 6. 버튼 클릭 이벤트 연결 (API_KEY 검사 조건문 없이 바로 실행)
        document.getElementById("btn1").addEventListener("click", () => {
            startChat("연중행사 연습 시작해줘");
        });

        document.getElementById("btn2").addEventListener("click", () => {
            startChat("프리토킹 시작해줘");
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>와사비 — 일본어 학습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --washi:#f3f1e2; --washi-2:#e9e6d0;
    --ink:#2a2b20; --ink-soft:#6a6c56;
    --wasabi:#7a9a3b; --wasabi-deep:#5f7d2a;
    --vermilion:#d8442b; --vermilion-deep:#b5341f;
    --gold:#e6ad45; --card:#fffdf4;
    --kr:"Gowun Dodum", sans-serif; --display:"Yomogi", cursive;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{font-family:var(--kr); color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(122,154,59,.20), transparent 60%),
      radial-gradient(90% 60% at 110% 110%, rgba(216,68,43,.10), transparent 60%),
      linear-gradient(180deg,var(--washi),var(--washi-2));
    background-attachment:fixed; display:flex; justify-content:center; overflow:hidden;}
  body::before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.05; z-index:0;
    background-image:radial-gradient(rgba(0,0,0,.6) .5px, transparent .5px); background-size:4px 4px;}

  #home{position:relative; z-index:1; width:100%; max-width:480px; height:100dvh;
    display:flex; flex-direction:column; justify-content:center; padding:28px 26px; gap:18px; overflow-y:auto;}
  .logo{width:74px; height:92px; margin:0 auto 2px; position:relative;
    background:linear-gradient(180deg,var(--wasabi),var(--wasabi-deep));
    border-radius:46% 46% 46% 46%/40% 40% 60% 60%;
    box-shadow:0 14px 34px rgba(95,125,42,.4), inset 0 -10px 20px rgba(0,0,0,.18);
    display:grid; place-items:center; color:#fbffe9; font-family:var(--display); font-size:.95rem; letter-spacing:1px;}
  .logo .cap{position:absolute; left:50%; top:-9px; transform:translateX(-50%); width:32px; height:11px; background:var(--ink); border-radius:4px;}
  h1{font-family:var(--display); font-weight:400; text-align:center; font-size:1.85rem; margin:6px 0 0; color:var(--wasabi-deep);}
  h1 small{display:block; font-family:var(--kr); color:var(--ink-soft); font-size:.86rem; margin-top:8px;}
  .pick{font-size:.92rem; color:var(--ink-soft); text-align:center; margin-top:2px;}

  .choice{display:flex; flex-direction:column; gap:14px; margin-top:4px;}
  .opt{display:flex; align-items:center; gap:15px; text-align:left; cursor:pointer;
    background:var(--card); border:1.5px solid rgba(0,0,0,.07); border-radius:18px; padding:18px 18px;
    box-shadow:0 8px 22px rgba(90,80,30,.08); transition:transform .12s, box-shadow .12s, border-color .12s;}
  .opt:active{transform:translateY(2px); box-shadow:0 4px 12px rgba(90,80,30,.1);}
  .opt .ic{flex:none; width:54px; height:54px; border-radius:15px; display:grid; place-items:center; font-size:1.7rem;}
  .opt.a .ic{background:linear-gradient(180deg,var(--wasabi),var(--wasabi-deep));}
  .opt.b .ic{background:linear-gradient(180deg,var(--vermilion),var(--vermilion-deep));}
  .opt .tx b{display:block; font-size:1.12rem; color:var(--ink); margin-bottom:3px;}
  .opt .tx span{font-size:.84rem; color:var(--ink-soft); line-height:1.5;}
  .opt.a{border-left:5px solid var(--wasabi);}
  .opt.b{border-left:5px solid var(--vermilion);}

  #backBtn{display:none; position:fixed; top:10px; left:10px; z-index:10;
    align-items:center; gap:6px; font-family:var(--kr); font-size:.86rem; color:#fff;
    background:rgba(40,42,30,.78); border:none; border-radius:22px; padding:9px 15px; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.25); backdrop-filter:blur(2px);}
  #appframe{position:fixed; inset:0; width:100%; height:100%; border:none; z-index:1; background:transparent;}
  #codeModal{display:none; position:fixed; inset:0; z-index:20; place-items:center;
    background:rgba(40,42,30,.55); backdrop-filter:blur(3px); padding:30px;}
  #codeModal .cbox{background:var(--card); border-radius:18px; padding:24px 22px; max-width:320px; width:100%;
    box-shadow:0 18px 50px rgba(0,0,0,.3); text-align:center;}
  #codeModal .ctitle{font-family:var(--display); color:var(--vermilion-deep); font-size:1.2rem; margin-bottom:6px;}
  #codeModal .cdesc{font-size:.86rem; color:var(--ink-soft); margin:0 0 14px;}
  #codeModal input{width:100%; font-family:var(--kr); font-size:1rem; padding:12px 14px;
    border:1.5px solid rgba(216,68,43,.3); border-radius:12px; outline:none; text-align:center; box-sizing:border-box;}
  #codeModal input:focus{border-color:var(--vermilion);}
  #codeModal .cerr{color:var(--vermilion-deep); font-size:.82rem; min-height:1.1em; margin-top:8px;}
  #codeModal .cbtns{display:flex; gap:10px; margin-top:12px;}
  #codeModal .cbtn{flex:1; font-family:var(--kr); font-weight:700; border:none; border-radius:12px; padding:12px; cursor:pointer;}
  #codeModal .cbtn.ok{background:linear-gradient(180deg,var(--vermilion),var(--vermilion-deep)); color:#fff;}
  #codeModal .cbtn.cancel{background:rgba(0,0,0,.07); color:var(--ink-soft);}
</style>
</head>
<body>
  <div id="home">
    <div class="logo">わさび<span class="cap"></span></div>
    <h1>와사비<small>일본어 학습 — 오늘은 무엇을 연습할까요?</small></h1>
    <p class="pick">아래에서 활동을 골라주세요.</p>
    <div class="choice">
      <button class="opt a" onclick="openApp('pronun')">
        <span class="ic">🗣️</span>
        <span class="tx"><b>발음 연습</b><span>일본어 문장을 소리 내어 읽고, 인식 점수를 받아요. (80% 이상 통과)</span></span>
      </button>
      <button class="opt b" onclick="openApp('talk')">
        <span class="ic">🏮</span>
        <span class="tx"><b>연중행사 회화</b><span>일본인 친구와 음성으로 대화하며 월·일·요일을 연습해요.</span></span>
      </button>
    </div>
  </div>

  <button id="backBtn" onclick="goHome()">← 처음으로</button>

  <div id="codeModal">
    <div class="cbox">
      <div class="ctitle">🔒 연중행사 회화 접속</div>
      <p class="cdesc">선생님이 알려준 접속 코드를 입력하세요.</p>
      <input id="codeInput" type="password" placeholder="접속 코드" autocomplete="off"
             onkeydown="if(event.key==='Enter')submitCode()">
      <div class="cerr" id="codeErr"></div>
      <div class="cbtns">
        <button class="cbtn cancel" onclick="hideCodeModal()">취소</button>
        <button class="cbtn ok" onclick="submitCode()">입장</button>
      </div>
    </div>
  </div>

function decodeB64(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

function loadApp(which){
  let html;
  if(which==="pronun"){
    html = decodeB64(B64_PRONUN);
  } else {
    html = decodeB64(B64_TALK);
    // 런처 상단의 설정값을 연중행사 앱에 주입
    if(TALK_API_KEY && TALK_API_KEY.indexOf("여기에")!==0)
      html = html.replace("여기에-선생님-GEMINI-API-키-입력", TALK_API_KEY);
    if(TALK_COLLECT_URL && TALK_COLLECT_URL.indexOf("여기에")!==0)
      html = html.replace("여기에-APPS-SCRIPT-웹앱-URL-입력", TALK_COLLECT_URL);
  }
  const f = document.createElement("iframe");
  f.id = "appframe";
  f.setAttribute("allow", "microphone; autoplay; camera");
  f.srcdoc = html;
  document.body.appendChild(f);
  document.getElementById("home").style.display = "none";
  document.getElementById("backBtn").style.display = "flex";
}

function openApp(which){
  // 회화/프리토킹은 접속 코드가 설정돼 있으면 코드 입력 후 입장 (발음 연습은 자유)
  if(which==="talk" && TALK_ACCESS_CODE){
    showCodeModal();
    return;
  }
  loadApp(which);
}

function showCodeModal(){
  document.getElementById("codeErr").textContent = "";
  document.getElementById("codeInput").value = "";
  document.getElementById("codeModal").style.display = "grid";
  setTimeout(function(){ document.getElementById("codeInput").focus(); }, 50);
}
function hideCodeModal(){ document.getElementById("codeModal").style.display = "none"; }
function submitCode(){
  var v = document.getElementById("codeInput").value.trim();
  if(v === String(TALK_ACCESS_CODE).trim()){
    hideCodeModal();
    loadApp("talk");
  } else {
    document.getElementById("codeErr").textContent = "접속 코드가 올바르지 않습니다.";
  }
}

function goHome(){
  const f = document.getElementById("appframe");
  if(f) f.remove();   // iframe 제거 -> 마이크/세션 자동 종료
  document.getElementById("home").style.display = "flex";
  document.getElementById("backBtn").style.display = "none";
}
</script>
